<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Theo Windebank</title>
  <meta name="description" content="Staff engineer with 8+ years across backend, data, and platform engineering. Currently at Gradient Labs. Previously Monzo and BBC.">
  <meta name="author" content="Theo Windebank">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://theowindebank.co.uk">

  <!-- Open Graph (Slack, LinkedIn, Facebook) -->
  <meta property="og:type" content="profile">
  <meta property="og:title" content="Theo Windebank">
  <meta property="og:description" content="Staff engineer with 8+ years across backend, data, and platform engineering. Currently at Gradient Labs. Previously Monzo and BBC.">
  <meta property="og:url" content="https://theowindebank.co.uk">
  <meta property="og:image" content="https://theowindebank.co.uk/og-image.png">
  <meta property="og:site_name" content="Theo Windebank">
  <meta property="profile:first_name" content="Theo">
  <meta property="profile:last_name" content="Windebank">

  <!-- Twitter / X -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Theo Windebank">
  <meta name="twitter:description" content="Staff engineer with 8+ years across backend, data, and platform engineering. Currently at Gradient Labs. Previously Monzo and BBC.">
  <meta name="twitter:image" content="https://theowindebank.co.uk/og-image.png">

  <!-- Theme colour (mobile browser chrome) -->
  <meta name="theme-color" content="#000000">

  <!-- Structured data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": "Theo Windebank",
    "jobTitle": "Staff Engineer",
    "url": "https://theowindebank.co.uk",
    "worksFor": { "@type": "Organization", "name": "Gradient Labs" },
    "alumniOf": { "@type": "EducationalOrganization", "name": "University of Oxford" },
    "sameAs": [
      "https://github.com/twindebank",
      "https://linkedin.com/in/theowindebank"
    ]
  }
  </script>

  <link rel="icon" type="image/png" href="favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/cv.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <div id="cv">
    <button id="pdf-btn" onclick="window.print()">PDF</button>
    <div id="content">Loading...</div>
  </div>
  <script>
    const logos = {
      'Gradient Labs':                        'gradient-labs.ai',
      'Monzo Bank':                           'monzo.com',
      'BBC':                                  'bbc.co.uk',
      'Oxford Machine Learning Research Group': 'ox.ac.uk',
      'University of Oxford':                 'ox.ac.uk',
    };

    function fallbackLogo() {
      const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      svg.setAttribute('width', '16');
      svg.setAttribute('height', '16');
      svg.setAttribute('viewBox', '0 0 16 16');
      svg.classList.add('entry-logo');
      const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      circle.setAttribute('cx', '8');
      circle.setAttribute('cy', '8');
      circle.setAttribute('r', '7');
      circle.setAttribute('fill', 'none');
      circle.setAttribute('stroke', '#444');
      circle.setAttribute('stroke-width', '1.5');
      svg.appendChild(circle);
      return svg;
    }

    fetch('cv.md')
      .then(r => r.text())
      .then(md => {
        document.getElementById('content').innerHTML = marked.parse(md);

        const h1 = document.querySelector('#content h1');
        const btn = document.getElementById('pdf-btn');
        h1.style.cssText = 'display:flex; justify-content:space-between; align-items:center;';
        h1.appendChild(btn);

        document.querySelectorAll('#content h3').forEach(h3 => {
          const text = h3.textContent;
          const match = Object.entries(logos).find(([name]) => text.startsWith(name));
          if (match) {
            const img = document.createElement('img');
            img.src = `https://www.google.com/s2/favicons?domain=${match[1]}&sz=32`;
            img.className = 'entry-logo';
            img.onerror = () => img.replaceWith(fallbackLogo());
            h3.prepend(img);
          } else {
            h3.prepend(fallbackLogo());
          }
        });
      });
  </script>
</body>
</html>
