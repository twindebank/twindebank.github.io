<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Theo Windebank</title>
  <meta name="description" content="CV — Theo Windebank">
  <meta name="author" content="Theo Windebank">
  <link rel="icon" type="image/png" href="favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/cv.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <div id="cv">
    <div id="content">Loading...</div>
  </div>
  <script>
    const logos = {
      'Gradient Labs':                        'gradient-labs.ai',
      'Monzo Bank':                           'monzo.com',
      'BBC':                                  'bbc.co.uk',
      'Oxford Machine Learning Research Group': 'ox.ac.uk',
      'University of Oxford':                 'ox.ac.uk',
    };

    function fallbackLogo() {
      const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      svg.setAttribute('width', '16');
      svg.setAttribute('height', '16');
      svg.setAttribute('viewBox', '0 0 16 16');
      svg.classList.add('entry-logo');
      const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      circle.setAttribute('cx', '8');
      circle.setAttribute('cy', '8');
      circle.setAttribute('r', '7');
      circle.setAttribute('fill', 'none');
      circle.setAttribute('stroke', '#444');
      circle.setAttribute('stroke-width', '1.5');
      svg.appendChild(circle);
      return svg;
    }

    fetch('cv.md')
      .then(r => r.text())
      .then(md => {
        document.getElementById('content').innerHTML = marked.parse(md);
        const headings = document.querySelectorAll('#content h3');
        let prevCompany = null;
        headings.forEach(h3 => {
          const text = h3.textContent;
          const company = text.split('—')[0].trim();

          if (prevCompany !== null && company !== prevCompany) {
            h3.classList.add('company-change');
          }
          prevCompany = company;

          const match = Object.entries(logos).find(([name]) => text.startsWith(name));
          if (match) {
            const img = document.createElement('img');
            img.src = `https://www.google.com/s2/favicons?domain=${match[1]}&sz=32`;
            img.className = 'entry-logo';
            img.onerror = () => img.replaceWith(fallbackLogo());
            h3.prepend(img);
          } else {
            h3.prepend(fallbackLogo());
          }
        });
      });
  </script>
</body>
</html>
